# Site settings
title: "Yang Ni"
tagline: "PhD Candidate · Tsinghua University · Astronomy"
description: >-
  Yang Ni — PhD candidate in astronomy at Tsinghua University. Research on
  protoplanetary disks and planet formation via gravitational instability, star
  formation in giant molecular clouds and AGN disks, and computational astrophysics.
url: ""        # leave empty until you go public
baseurl: ""    # leave empty for root deployment

# Author / personal info — referenced from layouts
author:
  name: Yang Ni
  chinese_name: 倪阳           # optional, change or remove
  email: ny22@mails.tsinghua.edu.cn
  position: PhD Candidate in Astronomy
  affiliation: Tsinghua University
  advisor: Prof. Xuening Bai
  orcid: "0000-0003-0794-1949"
  github: yni-astro
  ads: "Ni,+Y"   # used to build an ADS author-search link as the fallback
  # Paste your curated ADS library URL here once you have one. To get it:
  # 1. open your library on ADS, 2. click "Share Library", 3. copy the URL.
  # Leave empty ("") to fall back to an ADS author search.
  ads_library: "https://ui.adsabs.harvard.edu/public-libraries/frwLTIQUT2qIEgSxaHydnQ"

# Build settings
markdown: kramdown
permalink: pretty
sass:
  style: compressed

# Collections — adding a new entry is just a new markdown file in these folders
collections:
  publications:
    output: false
  talks:
    output: false
  news:
    output: false

# Excluded from the built site
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - PUBLISH.md
  - SETUP.md
  - profilephoto.jpg  # full-resolution master; build uses the optimized assets/images/profile.jpg
  - .DS_Store
  - .gitignore
