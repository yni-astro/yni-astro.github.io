<!DOCTYPE html>
<html lang="en">
<head>
{% include head.html %}
</head>
<body>
{% include sidebar.html %}

<main class="content">
  {% if page.show_title and page.title %}
    <header class="page-header">
      <h1 class="page-header__title">{{ page.title }}</h1>
      {% if page.subtitle %}<p class="page-header__subtitle">{{ page.subtitle }}</p>{% endif %}
      <hr class="page-header__rule">
    </header>
  {% endif %}

  {{ content }}

  <footer class="site-footer">
    <p>© {{ 'now' | date: '%Y' }} {{ site.author.name }} · last updated {{ site.time | date: '%b %Y' }}</p>
  </footer>
</main>

<script>
  /* Single-page scroll-spy: highlight the sidebar link for the section currently in view. */
  (function () {
    var links = [].slice.call(document.querySelectorAll('.sidebar__navlink[href^="#"]'));
    if (!links.length) return;
    var sections = links
      .map(function (a) { return document.getElementById(a.getAttribute('href').slice(1)); })
      .filter(Boolean);
    if (!sections.length || !('IntersectionObserver' in window)) return;

    function setActive(id) {
      links.forEach(function (a) {
        a.classList.toggle('is-active', a.getAttribute('href') === '#' + id);
      });
    }

    var obs = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) { if (e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin: '-30% 0px -65% 0px', threshold: 0 });

    sections.forEach(function (s) { obs.observe(s); });
  })();
</script>
</body>
</html>
