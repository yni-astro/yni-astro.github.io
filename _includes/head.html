<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.author.position }}{% endif %}</title>

<meta name="description" content="{{ site.description }}">
<meta name="author" content="{{ site.author.name }}">

<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Social preview (Open Graph + Twitter) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ site.author.name }} — {{ site.author.position }}, {{ site.author.affiliation }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ '/assets/images/profile.jpg' | absolute_url }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ site.author.name }} — {{ site.author.position }}, {{ site.author.affiliation }}">
<meta name="twitter:description" content="{{ site.description }}">
<meta name="twitter:image" content="{{ '/assets/images/profile.jpg' | absolute_url }}">

<!-- Structured data: links this page to your scholarly identity (helps Google disambiguate "Yang Ni") -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.author.name }}",
  "alternateName": "{{ site.author.chinese_name }}",
  "jobTitle": "{{ site.author.position }}",
  "affiliation": { "@type": "CollegeOrUniversity", "name": "Tsinghua University" },
  "alumniOf": { "@type": "CollegeOrUniversity", "name": "Nanjing University" },
  "url": "{{ '/' | absolute_url }}",
  "image": "{{ '/assets/images/profile.jpg' | absolute_url }}",
  "email": "{{ site.author.email }}",
  "knowsAbout": ["Protoplanetary disks", "Planet formation", "Gravitational instability", "Star formation", "Giant molecular clouds", "Computational astrophysics"],
  "sameAs": [
    "https://orcid.org/{{ site.author.orcid }}",
    "https://github.com/{{ site.author.github }}",
    "{{ site.author.ads_library }}",
    "https://www.ias.tsinghua.edu.cn/en/"
  ]
}
</script>

<link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
<link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">

<!-- Fonts: Inter for UI/body, Newsreader for italic accents in display -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">

<!-- Font Awesome 6 (free) for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Academicons for ORCID, Google Scholar, ADS, etc. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.4/css/academicons.min.css">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- MathJax 3 — renders LaTeX math (e.g. inline $\alpha$, $\beta_\mathrm{cool}$) in the research highlights -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
